<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Profil Tampil</title>

	<link rel="stylesheet" href="styles.css">

	<style>
		body{
			font-family: Arial, sans-serif;
			background-color: #111;
			color: white;
			margin: 0;
			padding: 0;
		}

		.container{
			max-width: 700px;
			margin: 100px auto;
			background-color: #1f1f1f;
			padding: 40px;
			border-radius: 20px;
			box-shadow: 0 0 20px rgba(0,0,0,0.4);
		}

		h1{
			text-align: center;
			margin-bottom: 30px;
		}

		#profilResult ul{
			list-style: none;
			padding: 0;
		}

		#profilResult li{
			margin: 15px 0;
			padding: 15px;
			background-color: #2b2b2b;
			border-radius: 10px;
			font-size: 18px;
		}

		a{
			display: inline-block;
			margin-top: 20px;
			color: white;
			text-decoration: none;
			border: 1px solid white;
			padding: 10px 20px;
			border-radius: 10px;
			transition: 0.3s;
		}

		a:hover{
			background-color: white;
			color: black;
		}
	</style>
</head>

<body>

	<div class="container">
		<h1>Data Profil</h1>

		<!-- HASIL DATA DARI JS -->
		<div id="profilResult"></div>

		<a href="profil.html">Kembali</a>
	</div>

	<script src="javascript/js.js"></script>

</body>
</html>
